<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>D3 PSET</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.7.4/d3.js"></script>
		<link href="https://fonts.googleapis.com/css?family=Open+Sans:300" rel="stylesheet"> 
		<style type="text/css">

		/* Task 6.1.4 */
		.text-styling {
			font-family: Arial, Helvetica, sans-serif;
			font-size: 14px;
		}

		/* Task 6.1.5 */
		.title-styling {
			font-family: Arial, Helvetica, sans-serif;
			font-size: 18px;
		}
			
		</style>
		</head>
		<body>
	
		
		<div id="main">
	
		</div>
		<script type="text/javascript">
			var width = 1200;
			var height = 1000 + 400;
		
			agriculturedata = [["Brazil", 33.9],["Canada", 6.9],["Costa Rica", 34.5],["Denmark", 62],["Fiji", 23.3],["France", 52.4],["Greenland", .6],["Italy", 43.2],["Mali",33.8],["Netherlands",53.3]];

			var svg = d3.select("div#main")
						.append("svg")
						.attr("width", width)
						.attr("height", height);

			
			/* Task 6.1.3 */			
			var g = svg.append('g')
				.attr('transform','translate(110,50)');

			g.selectAll("rect")
               .data(agriculturedata)
               .enter()
               .append("rect")
               .attr("y", function(d, i) {
                       return i*50 + 30;
                  })
               .attr("x", 100)
               .attr("width", function(d) {
                       return d[1]*4;
                  })
          	   .attr("height", 40)
				 // Task 6.1.1, 6.1.2
               .attr("fill", "green")
			   .attr("opacity",0.7);

			// Task 6.1.3
			var labels = g.selectAll("text")
			.data(agriculturedata)
			.enter()
			.append("text")
			.attr("y", function(d, i) {
				return i * 50 + 55;
			})
			.attr("x", 80)
			.attr("text-anchor","end")
			.attr("class","text-styling")
			.text(function(d, i) {return d[0]});

			// Task 6.1.5
			g.append("text")
			.attr("y",20)
			.attr("x",300)
			.text("Agricultural Land (% of total land)")
			.attr("text-anchor","middle")
			.attr("class","title-styling");

		</script>
		</div>
	</body>
</html>
