<!DOCTYPE html>
<html lang='en-US'>
    <head>
        <title>Pset 6: Part 2</title>
        <meta charset='utf-8'>
        <meta author='lubeso'>

        <link type='text/css' rel='stylesheet' href='part2.css'>

        <script src="https://d3js.org/d3.v5.min.js" charset="utf-8"></script>
        <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
        <script src="https://d3js.org/topojson.v2.min.js"></script>
    </head>
    <body>
        <main>
            <article id='tooltip' class='hidden'>
                <section id='value'>100</section>
            </article>
        </main>
    </body>
</html>

<script>
    // import data refs
    var turl = 'https://gist.githubusercontent.com/cesandoval/09b2e39263c748fbcb84b927cecc7c46/raw/ab71d3638efd2545ec99c2651c6f2ddcea9d2a07/boston.json';

    var rurl = 'https://raw.githubusercontent.com/brookefzy/BigData2020/master/pset6/boston_311.csv';

    // svg init =======================================
    var width = 800; var height = 800;

    // svg init
    var svg = d3.select('main')
                .append('svg')
                .attr('width',width)
                .attr('height',height);

    var x = d3.scaleLinear()
        .domain([0, 6])
        .rangeRound([0, 400]);

    // chloropleth scale init =========================

    var color = d3.scaleQuantize()
    .domain([0, 6])
    .range(d3.schemePurples[9]);

    var g = svg.append('g')
        .attr('class','key')
        .attr('transform','translate(0,25)');

    g.selectAll('rect')
        .data(color.range().map(function(d) {
            d = color.invertExtent(d);
            return d;
        }))
        .enter().append('rect')
        .attr('height',8)
        .attr('x',function (d) { return x(d[0]); })
        .attr('width',function (d) { return x(d[1]) - x(d[0]); })
        .attr('fill',function (d) { return color(d[0]); });

    g.append('text')
        .attr('class','caption')
        .attr('x',x.range()[x.range().length - 1])
        .attr('y',-6)
        .attr('fill','#fff')
        .attr('text-anchor','end')
        .attr('font-weight','bold')
        .text('Tweets per neighborhood (log scale)');

    g.call(d3.axisBottom(x)
    .ticks(3)
    .tickSize(13))
    .select('.domain')
    .remove();

    // projection params ==============================
    var albers = d3.geoAlbers()
        .scale(190000)
        .rotate([71.057, 0])
        .center([0, 42.313])
        .translate([width/2,height/2]);

    // geopath
    var path = d3.geoPath()
        .projection(albers);

    // GeoJson

    var reqs = d3.map();
    var tot = d3.map();

    var promises = [
                d3.json(turl),
                d3.csv(rurl, function(d) {reqs.set(d.id, +d.twitter);
                d3.csv(rurl, function(d) {tot.set(d.id, +d.tot_count)}) })
                ]

    Promise.all(promises).then(ready);

    function ready([bostonjson]){
        console.log(bostonjson);
        console.log(tot);
        console.log(svg);
        svg.append('g')
            .attr('stroke','white')
            .selectAll('path')
            .data(topojson.feature(bostonjson, bostonjson.objects.boston_neigh).features)
            .enter().append('path')
            .attr('d',path)
            .attr('fill', function (d) {
                return color(Math.log(reqs.get(d.properties.OBJECTID)))
            })
            .on('mouseover', function (d) {
                d3.select('#tooltip')
                .style('left', d3.event.pageX + 'px')
                .style('top', d3.event.pageY + 'px')
                .select('#value')
                .html('<p style="color: black;">' + String(reqs.get(d.properties.OBJECTID)) + ' Requests via twitter</p>')
                d3.select('#tooltip').classed('hidden',false);
            })
            .on('mouseout', function() {
                d3.select('#tooltip').classed('hidden',true);
            });

    }

</script>
